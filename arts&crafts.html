<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="arts&crafts.css">
</head>
<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("playBtn");

/* recuperar estado */
const wasPlaying = localStorage.getItem("musicPlaying");
const savedTime = localStorage.getItem("musicTime");

if(savedTime){
  audio.currentTime = savedTime;
}

if(wasPlaying === "true"){
  audio.play().catch(() => {});
}

/* botón */
btn.addEventListener("click", () => {
  if(audio.paused){
    audio.play();
    localStorage.setItem("musicPlaying", "true");
  }else{
    audio.pause();
    localStorage.setItem("musicPlaying", "false");
  }
});

/* guardar tiempo continuamente */
audio.addEventListener("timeupdate", () => {
  localStorage.setItem("musicTime", audio.currentTime);
});
</script>
<body>

  <a href="./" class="back-button">← volver</a>

  <div class="bg-full"></div>

  <main class="stage">

    <video class="craft-video" autoplay loop muted>
  <source src="./media/video.mp4" type="video/mp4">
</video>

    <div class="crafts-container">
      <img src="./media/photo1.JPG" alt="Foto 1" class="photo left">
    </div>
  </main>

</body>
</html>
